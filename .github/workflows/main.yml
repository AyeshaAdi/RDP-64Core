name: DEBUG RDP Session

on:
  workflow_dispatch:

jobs:
  rdp-session:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Configure RDP Service
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389

      - name: Create RDP User
        id: create_user
        run: |
          $password = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 20 | ForEach-Object {[char]$_})
          # ... rest of user creation script ...
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "runner" -Password $securePass -FullName "GitHub Runner"
          Add-LocalGroupMember -Group "Administrators" -Member "runner"
          Add-LocalGroup-Member -Group "Remote Desktop Users" -Member "runner"
          echo "password=$password" >> $env:GITHUB_OUTPUT

      - name: Install Tailscale
        run: Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "tailscale_setup.exe" ; ./tailscale_setup.exe /quiet

      - name: Debug Filesystem
        run: |
          Write-Host "--- Listing C:\Program Files ---"
          Get-ChildItem -Path "C:\Program Files" -Depth 1
          Write-Host "--- Listing C:\Program Files (x86) ---"
          Get-ChildItem -Path "C:\Program Files (x86)" -Depth 1
          Write-Host "--- Searching for tailscale.exe ---"
          Get-ChildItem -Path "C:\Program Files", "C:\Program Files (x86)" -Recurse -Filter tailscale.exe -ErrorAction SilentlyContinue | Select-Object FullName

      - name: Connect to Tailscale Network
        id: connect_tailscale
        run: |
          # This step will still fail, but we are interested in the debug step above
          $tsPath = (Get-Command tailscale.exe).Source # Dummy command for now
          & $tsPath up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-${{ github.run_id }}
          # ... rest of script
