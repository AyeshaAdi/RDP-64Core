name: Secure Public RDP Access

on:
  workflow_dispatch:

jobs:
  rdp-session:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Configure RDP Service
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControl-Set\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389

      - name: Create RDP User
        id: create_user
        run: |
          $password = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 20 | ForEach-Object {[char]$_})
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "runner" -Password $securePass -FullName "GitHub Runner"
          Add-LocalGroupMember -Group "Administrators" -Member "runner"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runner"
          echo "password=$password" >> $env:GITHUB_OUTPUT

      - name: Install Tailscale via Chocolatey
        run: choco install tailscale -y --no-progress

      - name: Connect to Tailscale Network
        id: connect_tailscale
        run: |
          $possiblePaths = @(
            "C:\Program Files\Tailscale\tailscale.exe",
            "C:\Program Files (x86)\Tailscale\tailscale.exe",
            "C:\ProgramData\chocolatey\bin\tailscale.exe"
          )
          $tsPath = $possiblePaths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $tsPath) {
            Write-Error "FATAL: Could not find tailscale.exe after installation."
            exit 1
          }
          Write-Host "Found tailscale.exe at $tsPath"
          & $tsPath up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-${{ github.run_id }}
          $tsIP = & $tsPath ip -4
          if (-not $tsIP) {
            Write-Error "Tailscale IP not assigned."
            exit 1
          }
          echo "ip=$tsIP" >> $env:GITHUB_OUTPUT

      - name: Send Private Credentials via Discord
        if: success()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          content: |
            **✅ RDP Session is Ready**
            **Repo:** ${{ github.repository }}
            **IP Address:** `${{ steps.connect_tailscale.outputs.ip }}`
            **Username:** `runner`
            **Password:** `||${{ steps.create_user.outputs.password }}||`

      - name: Keep Connection Alive
        run: Start-Sleep -Seconds 21000
