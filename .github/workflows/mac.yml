name: macOS VNC

on:
  workflow_dispatch:

jobs:
  macos-vnc:
    runs-on: macos-latest
    timeout-minutes: 3600

    steps:
      - name: Setup Secure Password and User
        run: |
          # Generate a random 12-character password
          PASSWORD=$(openssl rand -base64 12)
          echo "VNC_PASSWORD=$PASSWORD" >> $GITHUB_ENV
          
          # Workaround: Create a completely new admin user (bypasses the eDSAuthFailed error)
          sudo sysadminctl -addUser vncuser -fullName "VNC Admin" -password "$PASSWORD" -admin

      - name: Enable macOS Screen Sharing (VNC)
        run: |
          # Grant our new 'vncuser' full remote management privileges and start the server
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -users vncuser -privs -all -restart -agent
          
          # Enable Legacy VNC protocol so 3rd-party viewers (like RealVNC) can connect
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvnclegacy -vnclegacy yes -setvncpw -vncpw "$PASSWORD" -restart -agent

      - name: Install and Connect Tailscale
        run: |
          brew install tailscale
          
          sudo bash -c 'tailscaled > /tmp/tailscaled.log 2>&1 &'
          sleep 5
          
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=macos-gh-$GITHUB_RUN_ID
          
          TS_IP=$(sudo tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Maintain Connection & Print Credentials
        run: |
          echo -e "\n=== MACOS VNC ACCESS ==="
          echo "Address:  $TAILSCALE_IP"
          echo "Username: vncuser"
          echo "Password: $VNC_PASSWORD"
          echo -e "=========================\n"
          
          while true; do
              echo "[$(date)] VNC Active - Cancel workflow to terminate"
              sleep 300
          done
